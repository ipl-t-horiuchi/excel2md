<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel → Markdown 変換</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      color: #333;
    }
    h1 { font-size: 1.25rem; color: #065f46; }
    .upload-zone {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      background: #f9fafb;
      cursor: pointer;
      margin: 1rem 0;
    }
    .upload-zone:hover { border-color: #059669; background: #ecfdf5; }
    input[type="file"] { display: none; }
    #output {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f3f4f6;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.875rem;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }
    #preview {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      max-height: 500px;
      overflow-y: auto;
    }
    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.5rem 0;
    }
    #preview th, #preview td {
      border: 1px solid #d1d5db;
      padding: 0.35rem 0.5rem;
      text-align: left;
      vertical-align: top;
    }
    #preview code {
      background: #f3f4f6;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }
    .download-row { margin-top: 1rem; }
    .download-btn {
      padding: 0.5rem 1rem;
      background: #059669;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .download-btn:hover { background: #047857; }
    .status { color: #059669; margin-top: 0.5rem; }
    .error { color: #dc2626; }
    .sheet-selector {
      margin: 1rem 0;
      padding: 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
    }
    .sheet-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.5rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    .sheet-actions {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .sheet-btn {
      padding: 0.35rem 0.7rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .sheet-btn:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <h1>Excel → Markdown 変換</h1>
  <p>設計書などの .xlsx ファイルを選択すると、Markdown 形式に変換します。<strong>デフォルトはローカル完結（外部送信なし）</strong>です。</p>

  <details id="llmConfig" style="margin:1rem 0;padding:0.5rem;background:#f9fafb;border-radius:6px;border:1px solid #e5e7eb">
    <summary style="cursor:pointer;font-weight:600">LLMでセクション検出（任意・API送信あり）</summary>
    <div style="margin-top:0.5rem;font-size:0.875rem">
      <label><input type="checkbox" id="llmEnabled"> 使用する</label>
      <div style="margin-top:0.5rem" id="llmFields">
        <div><input type="url" id="apiUrl" placeholder="API URL (例: https://xxx/v1/chat/completions)" style="width:100%;max-width:400px;padding:0.25rem"></div>
        <div style="margin-top:0.25rem"><input type="password" id="apiKey" placeholder="API Key" style="width:100%;max-width:300px;padding:0.25rem"></div>
        <div style="margin-top:0.25rem"><input type="text" id="apiModel" placeholder="Model (任意)" style="width:100%;max-width:200px;padding:0.25rem"></div>
      </div>
    </div>
  </details>
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx">
    <p>クリックまたはドラッグ＆ドロップで .xlsx ファイルを選択</p>
  </div>
  <div id="status" class="status"></div>
  <div id="sheetSelector" class="sheet-selector" style="display:none">
    <strong>出力対象シート</strong>
    <div id="sheetList" class="sheet-list"></div>
    <div class="sheet-actions">
      <button type="button" id="selectAllSheets" class="sheet-btn">全選択</button>
      <button type="button" id="clearAllSheets" class="sheet-btn">全解除</button>
      <button type="button" id="applySheetSelection" class="sheet-btn">選択内容で再変換</button>
    </div>
  </div>
  <div id="output" style="display:none"></div>
  <div class="sheet-actions" id="previewRow" style="display:none">
    <button type="button" id="previewBtn" class="sheet-btn">プレビュー表示</button>
  </div>
  <h2 id="previewTitle" style="font-size:1rem;margin-top:1rem;color:#065f46;display:none">プレビュー</h2>
  <div id="preview" style="display:none"></div>
  <div id="downloadRow" class="download-row" style="display:none">
    <button type="button" id="downloadBtn" class="download-btn">Markdown をダウンロード</button>
    <button type="button" id="copyBtn" class="download-btn">クリップボードにコピー</button>
    <label style="margin-left:0.75rem;font-size:0.875rem">
      <input type="checkbox" id="splitBySheet">
      シートごとに分割してダウンロード
    </label>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const statusEl = document.getElementById('status');
    const sheetSelectorEl = document.getElementById('sheetSelector');
    const sheetListEl = document.getElementById('sheetList');
    const selectAllSheetsBtn = document.getElementById('selectAllSheets');
    const clearAllSheetsBtn = document.getElementById('clearAllSheets');
    const applySheetSelectionBtn = document.getElementById('applySheetSelection');
    const previewRow = document.getElementById('previewRow');
    const previewBtn = document.getElementById('previewBtn');
    const outputEl = document.getElementById('output');
    const previewTitleEl = document.getElementById('previewTitle');
    const previewEl = document.getElementById('preview');
    const downloadRow = document.getElementById('downloadRow');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const splitBySheetEl = document.getElementById('splitBySheet');
    let lastMarkdown = '';
    let lastFileName = '';
    let currentWorkbook = null;
    let lastSheetMarkdowns = [];

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function showOutput(text) {
      outputEl.textContent = text;
      outputEl.style.display = text ? 'block' : 'none';
    }

    function showPreview(markdown) {
      if (!markdown) {
        previewEl.innerHTML = '';
        previewEl.style.display = 'none';
        previewTitleEl.style.display = 'none';
        previewBtn.textContent = 'プレビュー表示';
        return;
      }
      previewEl.innerHTML = window.marked ? marked.parse(markdown) : markdown;
      previewEl.style.display = 'block';
      previewTitleEl.style.display = 'block';
      previewBtn.textContent = 'プレビュー非表示';
    }

    function renderSheetSelector(sheetNames) {
      sheetListEl.innerHTML = '';
      for (const name of sheetNames) {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.className = 'sheet-check';
        input.value = name;
        input.checked = true;
        label.appendChild(input);
        label.append(' ' + name);
        sheetListEl.appendChild(label);
      }
      sheetSelectorEl.style.display = sheetNames.length ? 'block' : 'none';
    }

    function getSelectedSheetNames() {
      return [...document.querySelectorAll('.sheet-check:checked')].map(el => el.value);
    }

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#059669'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.xlsx')) handleFile(file);
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });
    const sanitizeFileNamePart = (name) => String(name ?? '')
      .replace(/[<>:"/\\|?*\x00-\x1F]/g, '_')
      .replace(/\s+/g, ' ')
      .trim();

    const downloadMarkdown = (filename, content) => {
      const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    };

    downloadBtn.addEventListener('click', () => {
      if (!lastMarkdown) return;
      const base = lastFileName ? lastFileName.replace(/\.xlsx?$/i, '') : 'output';
      const splitBySheet = splitBySheetEl?.checked;
      if (splitBySheet && lastSheetMarkdowns.length > 0) {
        for (const sheet of lastSheetMarkdowns) {
          const suffix = sanitizeFileNamePart(sheet.sheetName) || 'sheet';
          downloadMarkdown(`${base}_${suffix}.md`, sheet.markdown);
        }
        return;
      }
      downloadMarkdown(base + '.md', lastMarkdown);
    });
    copyBtn.addEventListener('click', async () => {
      if (!lastMarkdown) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(lastMarkdown);
        } else {
          const ta = document.createElement('textarea');
          ta.value = lastMarkdown;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        setStatus('Markdownをクリップボードにコピーしました');
      } catch (err) {
        setStatus('コピーに失敗しました: ' + err.message, true);
      }
    });
    selectAllSheetsBtn.addEventListener('click', () => {
      document.querySelectorAll('.sheet-check').forEach(el => { el.checked = true; });
    });
    clearAllSheetsBtn.addEventListener('click', () => {
      document.querySelectorAll('.sheet-check').forEach(el => { el.checked = false; });
    });
    applySheetSelectionBtn.addEventListener('click', async () => {
      if (!currentWorkbook) return;
      await convertWorkbook(currentWorkbook, getSelectedSheetNames());
    });
    previewBtn.addEventListener('click', () => {
      if (!lastMarkdown) return;
      const isVisible = previewEl.style.display !== 'none';
      showPreview(isVisible ? '' : lastMarkdown);
    });

    async function detectSectionsWithLLM(rows, sheetName, apiUrl, apiKey, model) {
      if (!apiUrl || !apiKey || rows.length === 0) return null;
      const serialize = (rows, maxCells = 8) => rows.slice(0, 80).map((r, i) => {
        const vals = r.cells.slice(0, maxCells).map(c => String(c?.val ?? '').trim()).filter(Boolean);
        return `行${i}: [${vals.join(', ')}]`;
      }).join('\n');
      const prompt = `データベース設計書のExcelデータです。セクション境界を判定し、JSONのみで返答してください。
セクションを識別し、各セクションの開始行・終了行（0始まり）を返してください。
行番号は0からの通し番号です。不明なセクションも内容から推測してください。

シート名: ${sheetName}
データ:
${serialize(rows)}

応答（JSONのみ、他テキスト禁止）:
{"sections":[{"name":"セクション名","startRow":0,"endRow":5},{"name":"次のセクション","startRow":6,"endRow":10}]}`;

      try {
        const body = { model: model || 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] };
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const json = await res.json();
        const content = json.choices?.[0]?.message?.content?.trim() || json.content?.trim() || '';
        const m = content.match(/\{[\s\S]*\}/);
        const parsed = m ? JSON.parse(m[0]) : JSON.parse(content || '{}');
        return Array.isArray(parsed?.sections) ? parsed.sections : null;
      } catch (e) {
        console.error('LLM error:', e);
        return null;
      }
    }

    async function convertWorkbook(workbook, targetSheetNames) {
      const selectedSheetNames = targetSheetNames || workbook.SheetNames;
      if (selectedSheetNames.length === 0) {
        setStatus('出力対象シートを1つ以上選択してください', true);
        showOutput('');
        showPreview('');
        downloadRow.style.display = 'none';
        previewRow.style.display = 'none';
        lastMarkdown = '';
        return;
      }
      setStatus(`変換中…（${selectedSheetNames.length}シート）`);
      try {

          // ---- ユーティリティ ----
          const escapeCell = (s) => String(s ?? '').replace(/\|/g, '\\|').replace(/\n/g, ' ');

          const trimEmptyColumns = (grid) => {
            if (grid.length === 0) return grid;
            const colCount = grid[0].length;
            let start = 0, end = colCount - 1;
            while (start <= end && grid.every(row => !row[start])) start++;
            while (end >= start && grid.every(row => !row[end])) end--;
            if (start > end) return [[]];
            return grid.map(row => row.slice(start, end + 1));
          };

          const trimColumnsWithEmptyHeader = (grid) => {
            if (grid.length < 2) return grid;
            const header = grid[0];
            const hasData = (v) => v !== '' && v !== undefined && String(v).trim() !== '';
            const keepCols = header.map((v, i) =>
              hasData(v) || grid.some((row, ri) => ri > 0 && hasData(row[i]))
            );
            if (keepCols.every(Boolean)) return grid;
            return grid.map(row => row.filter((_, i) => keepCols[i]));
          };

          // ---- ブロック/テーブル判定ヘルパー ----

          /**
           * セクション見出し行の判定（構造のみ・名称ハードコードなし）
           * 一次判定: 非空セルが1つ + colSpan >= 3 + 値が純数字でない（幅広結合セル）
           * 二次判定: 非空セルが1つ + 純数字でない + 次行がテーブルヘッダー（文脈判定）
           * → colSpan が小さくても「見出し + ヘッダー行」パターンを確実に検出
           */
          const isSectionTitleRow = (row, nextRow) => {
            const nonEmpty = row.cells.filter(c => c.val !== '');
            if (nonEmpty.length !== 1) return false;
            const { val, colSpan = 1 } = nonEmpty[0];
            const valStr = String(val).trim();
            if (!valStr || /^\d+$/.test(valStr)) return false;
            // 番号付き見出し（例: "(5)...", "(5-2)...", "(6-2-1)..."）は
            // どの列にあっても・colSpan が小さくても見出し扱いにする
            if (/^\(\d+(?:-\d+)*\)/.test(valStr)) return true;
            // 幅広結合セルなら確定
            if (colSpan >= 3) return true;
            // colSpan が小さくても、直後がテーブルヘッダー行なら見出しと判断
            if (nextRow) {
              const nextNonEmpty = nextRow.cells.filter(c => c.val !== '');
              if (nextNonEmpty.length >= 2 && !/^\d+$/.test(String(nextNonEmpty[0].val).trim())) return true;
            }
            return false;
          };

          /**
           * テーブルヘッダー行の判定（構造のみ）
           * 条件: 非空セルが2つ以上 かつ 先頭非空セルが純数字でない
           * → "No. | 論理名 | 物理名" などのパターンを検出
           */
          const looksLikeTableHeader = (row) => {
            const nonEmpty = row.cells.filter(c => c.val !== '');
            if (nonEmpty.length < 2) return false;
            return !/^\d+$/.test(String(nonEmpty[0].val).trim());
          };

          const isStandaloneNoteRow = (row) => {
            const nonEmpty = row.cells.filter(c => c.val !== '');
            if (nonEmpty.length !== 1) return false;
            return String(nonEmpty[0].val).trim().startsWith('※');
          };

          /**
           * ブロックがテーブルか否かの判定
           * - セクション見出し行を含む → テーブル確定
           * - 3列以上の行が2行以上 → テーブル
           */
          const isTableBlock = (block) => {
            if (block.rows.some((row, i) => isSectionTitleRow(row, block.rows[i + 1]))) return true;
            if (block.rows.length < 2) return false;
            const byCount = {};
            for (const r of block.rows) {
              const n = r.cells.length;
              if (n >= 3) byCount[n] = (byCount[n] || 0) + 1;
            }
            return Object.values(byCount).some(n => n >= 2);
          };

          const blockToKeyValueList = (block) => {
            const pairs = [];
            let sectionTitle = '';
            block.rows.forEach((row, ri) => {
              const vals = row.cells.map(c => c.val);
              if (ri === 0 && vals.length >= 3 && vals[0] && vals[1] && vals[2]) {
                sectionTitle = vals[0];
                pairs.push({ k: vals[1], v: vals[2] });
                for (let i = 4; i < vals.length - 1; i += 2) {
                  const k = vals[i], v = vals[i + 1];
                  if (k) pairs.push({ k, v: v ?? '' });
                }
              } else {
                for (let i = 0; i < vals.length - 1; i += 2) {
                  const k = vals[i], v = vals[i + 1];
                  if (k) pairs.push({ k, v: v ?? '' });
                }
              }
            });
            return { sectionTitle, pairs };
          };

          // ---- シート変換 ----
          const mdParts = [];
          const perSheetMarkdowns = [];
          for (const sheetName of selectedSheetNames) {
            const sheet = workbook.Sheets[sheetName];
            const merges = sheet['!merges'] || [];
            const ref = sheet['!ref'];
            if (!ref) continue;
            const range = XLSX.utils.decode_range(ref);

            const formatCellValue = (r, c) => {
              const addr = XLSX.utils.encode_cell({ r, c });
              const cell = sheet[addr];
              if (!cell) return '';
              const v = cell.v;
              const z = cell.z || '';
              if (v == null) return '';
              if (typeof v === 'number' && v >= 10000 && v < 100000 && /[dDyYmM]/.test(z)) {
                try {
                  const d = XLSX.SSF.parse_date_code(v);
                  if (d && d.y) {
                    const y = d.y < 100 ? 1900 + d.y : d.y;
                    return `${y}/${d.m}/${d.d}`;
                  }
                } catch (_) {}
              }
              if (cell.w) return String(cell.w).trim();
              return String(v).trim();
            };

            const getMergeAt = (r, c) => merges.find(m =>
              r >= m.s.r && r <= m.e.r && c >= m.s.c && c <= m.e.c
            );

            const logicalValue = (r, c, useOwnCellIfUnderMerge = false) => {
              const m = getMergeAt(r, c);
              if (useOwnCellIfUnderMerge && m && m.s.r < r) {
                return formatCellValue(r, c);
              }
              const sr = m ? m.s.r : r, sc = m ? m.s.c : c;
              return formatCellValue(sr, sc);
            };

            // 論理セル行の構築（colspan/rowspan 正規化）
            const logicalCells = [];
            for (let r = range.s.r; r <= range.e.r; r++) {
              const row = [];
              for (let c = range.s.c; c <= range.e.c;) {
                const m = getMergeAt(r, c);
                const isTopLeft = !m || (m.s.r === r && m.s.c === c);
                const isUnderRowspan = m && m.s.r < r;
                if (!isTopLeft && !isUnderRowspan) { c = m.e.c + 1; continue; }
                const val = logicalValue(r, c, true);
                const colSpan = isUnderRowspan ? 1 : (m ? m.e.c - m.s.c + 1 : 1);
                const rowSpan = isUnderRowspan ? 1 : (m ? m.e.r - m.s.r + 1 : 1);
                row.push({ c, val, colSpan, rowSpan });
                c = isUnderRowspan ? c + 1 : (m ? m.e.c + 1 : c + 1);
              }
              if (row.length) logicalCells.push({ r, cells: row });
            }

            // 完全空行 or Excel方眼紙の余白行を除外
            const isFillerRow = (row) => {
              const allEmpty = row.cells.every(c => c.val === '');
              const manySingle = row.cells.length >= 15 && row.cells.every(c => c.colSpan === 1 && c.rowSpan === 1);
              return allEmpty && (manySingle || row.cells.length >= 20);
            };
            const filteredRows = logicalCells.filter(row =>
              !row.cells.every(c => c.val === '') && !isFillerRow(row)
            );

            /**
             * ブロック分割（構造ベース・名称ハードコードなし）
             * - 行間ギャップ（空行が間にある）→ 新ブロック
             * - セクション見出し行（isSectionTitleRow）→ 新ブロック
             */
            const detectBlocks = (rows) => {
              const blocks = [];
              let current = [];
              let lastR = -2;
              for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const rowGap = lastR >= 0 && row.r - lastR > 1;
                const isTitle = isSectionTitleRow(row, rows[i + 1]);
                if ((rowGap || isTitle) && current.length > 0) {
                  blocks.push({ rows: [...current] });
                  current = [];
                }
                current.push(row);
                lastR = row.r;
              }
              if (current.length) blocks.push({ rows: current });
              return blocks;
            };

            /**
             * ブロック内のサブテーブル分割
             * セクション見出し行（isSectionTitleRow）ごとに分割し、
             * { titleRow, bodyRows } の配列を返す
             */
            const splitToSubTables = (rows) => {
              const result = [];
              let titleRow = null;
              let bodyRows = [];
              const flush = () => {
                if (bodyRows.length > 0 || titleRow) {
                  result.push({ titleRow, bodyRows: [...bodyRows] });
                }
                titleRow = null;
                bodyRows = [];
              };
              for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (isSectionTitleRow(row, rows[i + 1])) {
                  flush();
                  titleRow = row;
                } else {
                  bodyRows.push(row);
                }
              }
              flush();
              return result;
            };

            // LLM or ローカルでブロック検出
            let blocks;
            const useLlm = document.getElementById('llmEnabled')?.checked
              && document.getElementById('apiUrl')?.value
              && document.getElementById('apiKey')?.value;
            if (useLlm) {
              setStatus('LLMでセクション検出中…');
              const apiUrl = document.getElementById('apiUrl').value.trim();
              const apiKey = document.getElementById('apiKey').value;
              const apiModel = document.getElementById('apiModel')?.value?.trim() || '';
              const sections = await detectSectionsWithLLM(filteredRows, sheetName, apiUrl, apiKey, apiModel);
              if (sections && sections.length > 0) {
                blocks = sections.map(s => ({
                  rows: filteredRows.slice(Math.max(0, s.startRow), Math.min(filteredRows.length, (s.endRow ?? s.startRow) + 1)),
                  title: s.name || ''
                }));
              } else {
                setStatus('LLM検出失敗・ヒューリスティックで継続');
                blocks = detectBlocks(filteredRows);
              }
            } else {
              blocks = detectBlocks(filteredRows);
            }

            // セル値を列インデックスで取得するヘルパー
            const getValAtCol = (row, colIdx) => {
              const cell = row.cells.find(c => colIdx >= c.c && colIdx < c.c + (c.colSpan || 1));
              return cell ? cell.val : '';
            };

            const beforeSheet = mdParts.length;
            mdParts.push(`# ${sheetName}\n`);
            for (const block of blocks) {
              const blockTitle = block.title || null;
              if (blockTitle) mdParts.push(`## ${escapeCell(blockTitle)}\n\n`);

              if (isTableBlock(block)) {
                // テーブルブロック処理（全て構造ベース）
                for (const { titleRow, bodyRows } of splitToSubTables(block.rows)) {
                  // セクション見出し → ## ヘッダー
                  if (!blockTitle) {
                    const titleVal = titleRow
                      ? String(titleRow.cells.find(c => c.val !== '')?.val ?? '').trim()
                      : null;
                    if (titleVal) mdParts.push(`## ${escapeCell(titleVal)}\n\n`);
                  }

                  if (bodyRows.length === 0) continue;

                  const noteRows = bodyRows.filter(isStandaloneNoteRow);
                  const tableCandidateRows = bodyRows.filter(r => !isStandaloneNoteRow(r));
                  if (tableCandidateRows.length === 0) {
                    for (const noteRow of noteRows) {
                      const note = String(noteRow.cells.find(c => c.val !== '')?.val ?? '').trim();
                      if (note) mdParts.push(`${escapeCell(note)}\n`);
                    }
                    if (noteRows.length) mdParts.push('\n');
                    continue;
                  }

                  // ヘッダー行の判定（先頭非空セルが非数値なら見出し行）
                  const nonEmptyFirst = tableCandidateRows[0].cells.filter(c => c.val !== '');
                  const hasHeaderRow = nonEmptyFirst.length >= 2
                    && !/^\d+$/.test(String(nonEmptyFirst[0].val).trim());
                  const headerRow = hasHeaderRow ? tableCandidateRows[0] : null;
                  const dataRows = (hasHeaderRow ? tableCandidateRows.slice(1) : tableCandidateRows)
                    .filter(r => r.cells.some(c => c.val !== ''));

                  // 列インデックスをヘッダー行の非空セル位置から収集
                  // ヘッダーが結合セル（colSpan>1）のとき、データ行が個別セルで持つ
                  // 同一値の繰り返しを防ぐため、ヘッダー起点を優先する
                  const colIndices = (() => {
                    if (headerRow) {
                      // ヘッダー行の「値あり」セルの開始列のみ（rowspan下の空セルは除外）
                      return headerRow.cells.filter(c => c.val !== '').map(c => c.c);
                    }
                    if (dataRows.length > 0) {
                      return [...new Set(dataRows.flatMap(r => r.cells.map(c => c.c)))].sort((a, b) => a - b);
                    }
                    return tableCandidateRows[0].cells.map(c => c.c);
                  })();
                  if (colIndices.length === 0) continue;

                  // グリッド構築 → 空列トリミング
                  const effectiveRows = headerRow ? [headerRow, ...dataRows] : dataRows;
                  const grid = effectiveRows.map(row => colIndices.map(ci => getValAtCol(row, ci)));
                  let trimmed = trimEmptyColumns(grid);
                  trimmed = trimColumnsWithEmptyHeader(trimmed);

                  if (trimmed.length > 0 && trimmed[0].length > 0) {
                    const lines = trimmed.map(row => '| ' + row.map(c => escapeCell(c)).join(' | ') + ' |');
                    const sep = '| ' + trimmed[0].map(() => '---').join(' | ') + ' |';
                    mdParts.push(lines[0] + '\n' + sep + '\n' + lines.slice(1).join('\n') + '\n');
                  }
                  for (const noteRow of noteRows) {
                    const note = String(noteRow.cells.find(c => c.val !== '')?.val ?? '').trim();
                    if (note) mdParts.push(`${escapeCell(note)}\n`);
                  }
                  if (noteRows.length) mdParts.push('\n');
                }
              } else {
                // キーバリューブロック処理
                const { sectionTitle, pairs } = blockToKeyValueList(block);
                if (!blockTitle && sectionTitle) mdParts.push(`## ${escapeCell(sectionTitle)}\n\n`);
                for (const { k, v } of pairs) mdParts.push(`- **${escapeCell(k)}**: ${escapeCell(v)}\n`);
                mdParts.push('\n');
              }
            }
            const sheetMarkdown = mdParts.slice(beforeSheet).join('');
            if (sheetMarkdown) {
              perSheetMarkdowns.push({ sheetName, markdown: sheetMarkdown });
            }
          }
          lastMarkdown = mdParts.join('');
          lastSheetMarkdowns = perSheetMarkdowns;

          showOutput(lastMarkdown);
          showPreview('');
          downloadRow.style.display = lastMarkdown ? 'block' : 'none';
          previewRow.style.display = lastMarkdown ? 'flex' : 'none';
          setStatus(`変換完了（${selectedSheetNames.length}シート）`);
      } catch (err) {
        setStatus('エラー: ' + err.message, true);
        showOutput(err.stack);
        showPreview('');
        previewRow.style.display = 'none';
      }
    }

    function handleFile(file) {
      setStatus('読み込み中…');
      showOutput('');
      showPreview('');
      downloadRow.style.display = 'none';
      previewRow.style.display = 'none';
      sheetSelectorEl.style.display = 'none';
      lastMarkdown = '';
      lastSheetMarkdowns = [];
      lastFileName = file.name;
      currentWorkbook = null;

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array', cellStyles: true, cellNF: true, cellText: true });
          currentWorkbook = workbook;
          renderSheetSelector(workbook.SheetNames);
          await convertWorkbook(workbook, workbook.SheetNames);
        } catch (err) {
          setStatus('エラー: ' + err.message, true);
          showOutput(err.stack);
          showPreview('');
          previewRow.style.display = 'none';
        }
      };
      reader.readAsArrayBuffer(file);
    }
  </script>
</body>
